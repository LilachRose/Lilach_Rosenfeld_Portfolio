    <style>
:root {
  --background: #ede7d6;
  --ink: #422a4f;
  --mutedInk: #6b5a72;
  --panel: #dbd1d6;
  --accent: #00c4cc;
  --blush: #d9a4bd;
  --white: #ffffff;
  --black: #111014;
  --hot: #ec4d9a;
  --shadow: 0 18px 44px rgba(17, 16, 20, 0.12);
  --max: 1240px;
  --gutter: clamp(16px, 4vw, 42px);
  --display: Georgia, "Times New Roman", serif;
  --body: "Helvetica Neue", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  color: var(--black);
  background: #fff6f0;
  font-family: var(--body);
  line-height: 1.5;
}

img {
  display: block;
  max-width: 100%;
}

a {
  color: inherit;
}

button {
  font: inherit;
}

.link-card,
.gallery-item {
  position: relative;
}

.link-card {
  display: grid;
  min-width: 0;
}

.skip-link {
  position: fixed;
  left: 16px;
  top: 16px;
  z-index: 20;
  padding: 10px 14px;
  background: var(--white);
  transform: translateY(-150%);
}

.skip-link:focus {
  transform: translateY(0);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 12px var(--gutter);
  color: var(--black);
  background: rgba(255, 246, 240, 0.94);
  border-bottom: 2px solid var(--black);
  backdrop-filter: blur(14px);
}

.brand {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 2px solid var(--black);
  border-radius: 50%;
  background: var(--hot);
  color: var(--white);
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0;
  text-decoration: none;
}

.site-nav {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 10px 18px;
  font-size: 0.72rem;
  letter-spacing: 0.11em;
  text-transform: uppercase;
}

.site-nav a,
.nav-group > a {
  padding: 7px 10px;
  border-radius: 999px;
  text-decoration: none;
  opacity: 1;
}

.site-nav a:hover,
.site-nav a:focus,
.nav-group:focus-within > a {
  background: var(--white);
  outline: 1px solid var(--black);
  text-decoration: none;
}

.nav-group {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.nav-submenu {
  position: absolute;
  top: 100%;
  left: 50%;
  z-index: 15;
  display: none;
  min-width: 220px;
  padding: 18px 10px 10px;
  background: rgba(255, 246, 240, 0.98);
  border: 2px solid var(--black);
  border-radius: 12px;
  box-shadow: var(--shadow);
  transform: translateX(-50%);
}

.nav-group:hover .nav-submenu,
.nav-group:focus-within .nav-submenu {
  display: grid;
  gap: 4px;
}

.nav-submenu a {
  display: block;
  padding: 8px 10px;
  font-size: 0.68rem;
  white-space: nowrap;
}

.menu-toggle {
  display: none;
  border: 2px solid var(--black);
  border-radius: 999px;
  padding: 8px 14px;
  color: var(--black);
  background: var(--white);
  font: inherit;
}

.section-page {
  width: min(1440px, calc(100% - 28px));
  margin: 16px auto;
  padding: clamp(34px, 4vw, 58px);
  background: rgba(255, 255, 255, 0.68);
  border: 2px solid var(--black);
  border-radius: 18px;
  box-shadow: var(--shadow);
}

.section-skills {
  background: #fffafa;
}

.section-logos {
  background: #f1e7ff;
}

.section-cards {
  background: #fff0f7;
}

.section-brandBlocks {
  background: #eaf7fb;
}

.section-feature {
  background: var(--black);
  color: var(--white);
}

.section-showcase,
.section-integrated {
  background: #fff0f7;
}

.section-contentHub {
  background: linear-gradient(135deg, #ffffff 0%, #ffd8dc 100%);
}

.section-events {
  background: var(--black);
  color: var(--white);
}

.section-contact {
  background: linear-gradient(135deg, #ffffff 0%, #ffd8dc 100%);
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(230px, 1fr);
  align-items: center;
  gap: clamp(20px, 4vw, 56px);
  min-height: calc(100svh - 108px);
  background: var(--white);
}

.hero > *,
.section-heading > *,
.skills-layout > *,
.feature-layout > *,
.contact-layout > * {
  min-width: 0;
}

.hero-copy h1 {
  margin: 0;
  font-family: var(--body);
  font-weight: 900;
  line-height: 0.8;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.hero-copy .section-label {
  margin-bottom: 14px;
  color: var(--black);
  font-size: clamp(1rem, 1.9vw, 1.7rem);
  line-height: 1.1;
  letter-spacing: 0.1em;
}

.hero-copy h1 {
  font-size: clamp(2.6rem, 6.25vw, 5.7rem);
  max-width: 100%;
}

.hero-copy h1 span {
  display: block;
}

.hero-copy h1 span:first-child {
  color: var(--hot);
}

.hero-copy h1 span:last-child {
  color: var(--black);
}

.hero-tagline {
  max-width: 860px;
  margin: clamp(18px, 2.4vw, 30px) 0 0;
  color: var(--blush);
  font-size: clamp(1rem, 1.35vw, 1.25rem);
  font-weight: 900;
  line-height: 1.25;
  letter-spacing: 0.025em;
}

.section-label {
  margin: 0;
  font-family: var(--body);
  color: var(--hot);
  font-size: clamp(1.7rem, 4vw, 3.8rem);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.hero-media {
  margin: 0;
  overflow: hidden;
  border: 2px solid var(--black);
  border-radius: 14px;
  background: var(--accent);
}

.hero-media img {
  width: 100%;
  height: clamp(190px, 32vw, 430px);
  object-fit: cover;
}

.section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px clamp(36px, 6vw, 80px);
  margin-bottom: clamp(30px, 4vw, 52px);
}

.section-heading .section-label {
  margin-bottom: 0;
}

.intro {
  max-width: 620px;
  margin: 0;
  color: var(--mutedInk);
  font-size: clamp(1rem, 1.45vw, 1.35rem);
}

.skills-layout {
  width: 100%;
  max-width: none;
}

.skill-list {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: clamp(14px, 2vw, 22px);
}

.skill-row h3 {
  margin: 0;
  font-size: clamp(1.02rem, 1.45vw, 1.32rem);
  line-height: 1.08;
  letter-spacing: 0.03em;
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 9px 10px;
  margin-top: 18px;
}

.skill-tags span {
  display: inline-flex;
  padding: 7px 10px;
  color: var(--black);
  background: rgba(255, 255, 255, 0.75);
  border: 1.5px solid var(--black);
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 800;
  line-height: 1.1;
}

.skill-row {
  position: relative;
  min-height: 220px;
  padding: 22px;
  overflow: hidden;
  background: linear-gradient(135deg, #ffffff 0%, #ffd0e7 100%);
  border: 2px solid var(--black);
  border-radius: 10px;
}

.skill-row:nth-child(2) {
  background: linear-gradient(135deg, #ffffff 0%, #d9ebff 100%);
}

.skill-row:nth-child(3) {
  background: linear-gradient(135deg, #ffffff 0%, #ead7ff 100%);
}

.skill-row:nth-child(4) {
  background: linear-gradient(135deg, #ffffff 0%, #d8f7ee 100%);
}

.skill-row:nth-child(5) {
  background: linear-gradient(135deg, #ffffff 0%, #ffe0c8 100%);
}

.skill-row:nth-child(6) {
  background: linear-gradient(135deg, #ffffff 0%, #f1e2ff 100%);
}

.skill-row:nth-child(7) {
  background: linear-gradient(135deg, #ffffff 0%, #dff2ff 100%);
}

.skill-row:nth-child(8) {
  background: linear-gradient(135deg, #ffffff 0%, #ffd8dc 100%);
}

.skill-row:nth-child(9) {
  background: linear-gradient(135deg, #ffffff 0%, #efe6d5 100%);
}

.skill-row:nth-child(10) {
  background: linear-gradient(135deg, #ffffff 0%, #cfeef7 100%);
}

.project-logo-grid {
  display: flex;
  flex-wrap: wrap;
  max-width: calc((280px * 3) + (24px * 2));
  margin-inline: auto;
  justify-content: center;
  gap: clamp(14px, 2vw, 24px);
  align-items: center;
}

.project-logo {
  display: grid;
  width: 100%;
  max-width: none;
  min-height: 174px;
  padding: 24px;
  place-items: center;
  background: linear-gradient(145deg, #ffffff, #ead9f4);
  border: 2px solid var(--black);
  border-radius: 10px;
  transition: transform 180ms ease, background 180ms ease;
  cursor: pointer;
}

.project-logo-grid .link-card {
  flex: 0 0 280px;
  max-width: 280px;
}

.project-logo:hover,
.project-logo:focus {
  background: linear-gradient(145deg, #ffffff, #e2cdec);
  transform: translateY(-3px);
}

.project-logo img {
  max-height: 108px;
  max-width: 88%;
  object-fit: contain;
}

.article-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: clamp(16px, 2vw, 28px);
}

.article-card {
  display: grid;
  align-content: start;
  min-height: 230px;
  padding: 24px;
  color: var(--black);
  background: linear-gradient(145deg, #ffffff, #f4d7e6);
  border: 2px solid var(--black);
  border-radius: 10px;
  font: inherit;
  text-align: left;
  text-decoration: none;
  transition: transform 180ms ease, box-shadow 180ms ease;
  cursor: pointer;
}

.article-card:hover,
.article-card:focus {
  transform: translateY(-3px);
  box-shadow: 0 16px 38px rgba(66, 42, 79, 0.14);
}

.article-card img {
  width: 100%;
  height: 62px;
  object-fit: contain;
  object-position: left center;
  margin-bottom: 22px;
}

.article-card h3 {
  margin: 0;
  font-family: var(--display);
  font-size: clamp(1.05rem, 1.7vw, 1.45rem);
  font-weight: 400;
  line-height: 1.25;
}

.article-card h3[dir="rtl"] {
  text-align: right;
}

.article-card:has(h3[dir="rtl"]) img {
  object-position: right center;
}

.brand-blocks {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(16px, 2vw, 24px);
  align-items: stretch;
  overflow: visible;
}

.brand-block {
  display: grid;
  min-height: 210px;
  padding: 28px;
  align-items: center;
  justify-items: center;
  background: linear-gradient(135deg, #ffffff 0%, #cfeef7 100%);
  border: 2px solid var(--black);
  border-radius: 10px;
  font: inherit;
  text-decoration: none;
  transition: transform 180ms ease, filter 180ms ease;
  cursor: pointer;
}

.brand-block:hover,
.brand-block:focus {
  transform: translateY(-3px);
  filter: saturate(1.08);
}

.brand-block img {
  max-height: 118px;
  object-fit: contain;
}

.block-1 {
  grid-column: auto;
  grid-row: auto;
}

.block-2 {
  grid-column: auto;
  grid-row: auto;
}

.block-3 {
  grid-column: auto;
  grid-row: auto;
}

.feature-layout {
  position: relative;
  display: block;
}

.feature-media {
  position: relative;
  display: block;
  margin: 0;
  max-width: 1160px;
  margin-inline: auto;
  padding: 0;
  color: inherit;
  background: transparent;
  border: 0;
  cursor: pointer;
}

.feature-media img {
  width: 100%;
  border: 2px solid var(--black);
  border-radius: 12px;
}

.section-feature .section-label,
.section-events .section-label {
  color: var(--white);
}

.play-button {
  position: absolute;
  inset: 50% auto auto 50%;
  width: clamp(56px, 7vw, 84px);
  height: clamp(56px, 7vw, 84px);
  border: 3px solid var(--ink);
  border-radius: 50%;
  background: rgba(237, 231, 214, 0.68);
  transform: translate(-50%, -50%);
}

.play-button::after {
  content: "";
  position: absolute;
  left: 42%;
  top: 30%;
  border-top: 14px solid transparent;
  border-bottom: 14px solid transparent;
  border-left: 22px solid var(--ink);
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(18px, 3vw, 42px);
  align-items: start;
}

.gallery-item {
  display: grid;
  gap: 12px;
  align-content: start;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  max-height: none;
  object-fit: contain;
}

.item-title {
  display: flex;
  gap: 10px;
  align-items: baseline;
  min-height: 34px;
}

.item-title span {
  font-family: var(--display);
  font-size: 1.1rem;
  letter-spacing: 0.12em;
}

.item-title h3,
.item-title h4,
.event-item h3 {

  color: var(--mutedInk);
  font-size: clamp(0.94rem, 1.16vw, 1.08rem);
  font-weight: 600;
}

.showcase-grid {
  display: grid;
  grid-template-columns: 0.92fr 1fr 1.12fr;
  gap: clamp(18px, 3vw, 38px);
  align-items: stretch;
}

.showcase-item {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 14px;
}

.showcase-item,
.gallery-item,
.event-item {
  min-width: 0;
}

.showcase-item img {
  width: 100%;
  height: 460px;
  object-fit: contain;
  background: var(--white);
  border: 2px solid var(--black);
  border-radius: 10px;
}

.showcase-3 img {
  height: 620px;
}

.integrated-stack {
  display: grid;
  gap: 0;
}

.copy-section {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 28px 0;
  border-top: 2px solid var(--black);
}

.copy-section + .copy-section {
  margin-top: 28px;
}

.copy-title {
  text-align: left;
}

.section-showcase .showcase-grid {
  padding-top: 4px;
}

.copywriting-stack .copy-section:first-child {
  border-top: 0;
}

.content-block-integrated .copy-section:first-child {
  padding-top: 0;
  border-top: 0;
}

.content-block-integrated .copy-section + .copy-section {
  margin-top: 28px;
}

.section-showcase .section-heading {
  margin-bottom: 18px;
}

.section-showcase .showcase-grid,
.content-block-showcase .showcase-grid {
  display: grid;
  grid-template-columns: minmax(150px, 220px) repeat(4, minmax(0, 1fr));
  gap: clamp(16px, 3vw, 28px);
  align-items: start;
}

.content-block-showcase .showcase-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  justify-content: center;
}

#copywriting .showcase-grid {
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: clamp(16px, 2vw, 24px);
}

#copywriting .showcase-item {
  grid-column: span 2;
}

#copywriting .showcase-item:nth-child(4) {
  grid-column: 2 / span 2;
}

#copywriting .showcase-item:nth-child(5) {
  grid-column: 4 / span 2;
}

#copywriting .showcase-item,
#copywriting .gallery-item {
  grid-template-rows: auto 1fr;
}

#copywriting .showcase-item img,
#copywriting .needs-large-view img {
  height: 290px;
  width: 100%;
  object-fit: contain;
}

.section-showcase .showcase-grid::before {
  content: "";
  display: none;
}

.content-hub {
  display: grid;
  gap: 0;
}

.content-block {
  display: grid;
  gap: 16px;
  padding-top: 28px;
  border-top: 2px solid var(--black);
}

.content-block + .content-block {
  margin-top: 56px;
}

.content-block:first-child {
  padding-top: 0;
  border-top: 0;
}

.content-block-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px clamp(28px, 5vw, 62px);
}

.content-block-heading h2 {
  margin: 0;
  color: var(--accent);
  font-size: clamp(1.25rem, 2vw, 1.8rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.content-block-integrated .integrated-group h3 {
  font-size: clamp(1.25rem, 2vw, 1.8rem);
}

.integrated-group h3 {
  margin: 0;
  font-family: var(--body);
  color: var(--accent);
  font-size: clamp(1.15rem, 2vw, 1.65rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  text-align: left;
}

.compact-gallery {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  align-items: stretch;
  justify-content: stretch;
  gap: clamp(16px, 2vw, 24px);
}

.compact-gallery .gallery-item {
  grid-template-rows: auto 1fr;
}

.compact-gallery .gallery-item:has(.focus-image:first-child) {
  grid-template-rows: 1fr;
}

.compact-gallery .gallery-item img {
  height: 260px;
  background: var(--white);
  border: 2px solid var(--black);
  border-radius: 10px;
}

#social-media .gallery-item img {
  object-fit: cover;
  background: transparent;
}

#social-media .fit-cover-top img {
  object-position: top center;
}

#social-media .story-break + .gallery-item + .gallery-item img,
#social-media .story-break + .gallery-item + .gallery-item + .gallery-item img {

  object-fit: contain;
  background: var(--white);
}

.sample-link {
  justify-self: center;
  margin-top: 4px;
  padding: 8px 14px;
  color: var(--black);
  background: var(--white);
  border: 2px solid var(--black);
  border-radius: 999px;
  font-weight: 900;
  cursor: pointer;
}

.linked-sample {
  display: block;
  width: 100%;
  height: 260px;
  padding: 0;
  overflow: hidden;
  appearance: none;
  background: transparent;
  border: 0;
  border-radius: 0;
  line-height: 0;
  cursor: pointer;
}

.linked-sample img {
  width: 100%;
  height: 100%;
  background: var(--white);
  border: 2px solid var(--black);
  border-radius: 10px;
  object-fit: contain;
}

#copywriting .linked-sample {
  height: 290px;
}

#copywriting .fit-social-link-cover img {
  object-fit: cover;
  object-position: center center;
}

.story-break {
  grid-column: 1 / -1;
  margin: 0 0 -10px;
  min-height: 0;
}

.print-link {
  display: none;
}

.fit-cover-top img {
  object-fit: cover;
  object-position: top center;
}

.fit-contain img {
  object-fit: contain !important;
  background: var(--white) !important;
}

.fit-natural img {
  height: auto !important;
  object-fit: contain !important;
  background: transparent !important;
}

.fit-fill img {
  object-fit: fill !important;
  background: transparent !important;
}

.fit-backdrop {
  position: relative;
  display: block;
  width: 100%;
  height: 260px;
  overflow: hidden;
  border: 2px solid var(--black) !important;
  border-radius: 10px;
  background: transparent;
}

.fit-backdrop .sample-backdrop {
  position: absolute;
  inset: -18px;
  z-index: 0;
  background-position: center;
  background-size: cover;

}

.fit-backdrop img {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 1;
  width: 118%;
  height: auto !important;
  max-width: none;
  transform: translate(-50%, -50%);
  object-fit: contain !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
}

.fit-pdf-backdrop .sample-backdrop {
  display: none;
}

.sample-backdrop {
  display: none;
}

@media screen {
  .fit-site-backdrop-contain {
    position: relative;
    display: block;
    width: 100%;
    height: 260px;
    overflow: hidden;
    border: 2px solid var(--black) !important;
    border-radius: 10px;
    background: transparent;
  }

  .fit-site-backdrop-contain .sample-backdrop {
    position: absolute;
    inset: -18px;
    z-index: 0;
    display: block;
    background-position: center;
    background-size: cover;
    filter: blur(18px);
    transform: scale(1.08);
  }

  .fit-site-backdrop-contain img {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100% !important;
    object-fit: contain !important;
    border: 0 !important;
    border-radius: 0 !important;
    background: transparent !important;
  }

.fit-maternity-cover img {
  width: 100%;
  height: 260px !important;
  object-fit: cover !important;
  object-position: center top;
  background: transparent !important;
}

/* Color-fill trial: one tint per area, only behind images/empty space. */
#copywriting .focus-image,
#copywriting .linked-sample,
#copywriting .showcase-item img,
#copywriting .linked-sample img {
  background: linear-gradient(145deg, #fff8fc 0%, #f4d7e6 100%) !important;
}

#integrated-marketing-samples .focus-image,
#integrated-marketing-samples .linked-sample {
  display: block;
  width: 100%;
  height: 292px;
  box-sizing: border-box;
  background:
    radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.76), transparent 34%),
    linear-gradient(145deg, #e7fbff 0%, #cceff8 38%, #a9ddea 100%) !important;
  border: 2px solid var(--black);
  border-radius: 10px;
  padding: 16px 22px;
  overflow: hidden;
}

#integrated-marketing-samples .focus-image img,
#integrated-marketing-samples .linked-sample img {
  width: 100%;
  height: 100%;
  background: var(--white) !important;
  border: 0;
  border-radius: 0;
  object-fit: contain;
}

#social-media .story-break + .gallery-item img,
#social-media .story-break + .gallery-item + .gallery-item img,
#social-media .story-break + .gallery-item + .gallery-item + .gallery-item img {
  background: linear-gradient(135deg, #ffffff 0%, #ffd8dc 100%) !important;
}

.needs-large-view img {
  height: 320px;
}

.showcase-item img,
.compact-gallery .gallery-item img {
  padding: 0;
}

.showcase-item img {
  height: 260px;
}

.showcase-3 img {
  height: 260px;
}

.event-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(18px, 2.5vw, 30px);
  justify-content: center;
}

.event-item {
  display: grid;
  gap: 10px;
  min-height: 300px;
  padding: 14px;
  color: inherit;
  background: #151515;
  border: 2px solid var(--white);
  border-radius: 10px;
  font: inherit;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: transform 180ms ease, border-color 180ms ease;
}

.event-item h3 {
  text-align: center;
}

.event-item:hover,
.event-item:focus {
  border-color: var(--hot);
  transform: translateY(-3px);
}

.event-item img {
  width: 100%;
  height: 180px;
  aspect-ratio: auto;
  object-fit: cover;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 0;
}

.event-item:first-child img {
  object-position: center top;
}

.focus-image {
  display: block;
  width: 100%;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: zoom-in;
  transition: transform 180ms ease, filter 180ms ease;
}

.focus-image:hover,
.focus-image:focus {
  transform: scale(1.035);
  filter: saturate(1.08);
  outline: none;
}

.lightbox {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  place-items: center;
  padding: 54px 18px 20px;
  background: rgba(8, 8, 8, 0.82);
}

.lightbox.is-open {
  display: grid;
}

.lightbox img {
  width: auto;
  max-width: 100%;
  max-height: 90vh;
  justify-self: center;
  align-self: center;
  object-fit: contain;
  background: transparent;
  border: 0;
  border-radius: 0;
}

.lightbox img[src*="integrated-billboard-card"],
.lightbox img[src*="integrated-flyer-card"],
.lightbox img[src*="integrated-email-card"],
.lightbox img[src*="integrated-landing-card"] {
  background: transparent !important;
  border: 0 !important;
  padding: 0 !important;
  box-shadow: none !important;
}

.lightbox figure {
  display: grid;
  grid-template-columns: 1fr;
  place-items: center;
  gap: clamp(14px, 2vw, 24px);
  width: min(94vw, 1500px);
  max-height: 92vh;
  overflow: auto;
  margin: 0;
  padding-left: min(260px, 18vw);
}

.lightbox-meta {
  position: fixed;
  top: 72px;
  left: 24px;
  z-index: 2;
  width: min(230px, calc(100vw - 48px));
  display: grid;
  gap: 12px;
  align-self: start;
  justify-self: start;
  padding-top: 0;
  min-height: 74px;
}

.lightbox-category {
  margin: 0;
  color: var(--hot);
  font-size: clamp(1.1rem, 2vw, 1.7rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.lightbox figcaption {
  margin: 0;
  color: var(--white);
  font-weight: 900;
}

.lightbox img.is-large-sample {
  width: min(64vw, 780px);
  max-height: none;
}

.lightbox-close {
  position: absolute;
  top: 18px;
  right: 24px;
  padding: 10px 16px;
  border: 2px solid var(--white);
  border-radius: 999px;
  color: var(--white);
  background: transparent;
  font-weight: 900;
}

.lightbox-open {
  overflow: hidden;
}

.lightbox-nav {
  position: absolute;
  top: 50%;
  width: clamp(44px, 6vw, 60px);
  height: clamp(44px, 6vw, 60px);
  display: grid;
  place-items: center;
  padding: 0;
  border: 2px solid var(--white);
  border-radius: 50%;
  color: var(--white);
  background: rgba(17, 16, 20, 0.62);
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  line-height: 0;
  transform: translateY(-50%);
}

.lightbox-nav::before {
  content: "";
  width: 42%;
  height: 42%;
  border-top: 4px solid currentColor;
  border-right: 4px solid currentColor;
}

.lightbox-prev::before {
  transform: translateX(2px) rotate(-135deg);
}

.lightbox-next::before {
  transform: translateX(-2px) rotate(45deg);
}

.lightbox-prev {
  left: 22px;
}

.lightbox-next {
  right: 22px;
}

.video-lightbox {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: none;
  place-items: center;
  padding: 72px 24px 28px;
  background: rgba(8, 8, 8, 0.86);
}

.video-lightbox.is-open {
  display: grid;
}

.video-frame {
  position: relative;
  width: min(94vw, 1040px);
  display: grid;
  gap: 12px;
}

.video-frame iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 2px solid var(--white);
  border-radius: 12px;
  background: var(--black);
}

.video-close {
  position: absolute;
  right: 0;
  top: -54px;
  padding: 10px 16px;
  border: 2px solid var(--white);
  border-radius: 999px;
  color: var(--white);
  background: transparent;
  font-weight: 900;
}

.video-fallback {
  justify-self: end;
  color: var(--white);
  font-weight: 900;
  text-underline-offset: 4px;
}

.page-lightbox {
  position: fixed;
  inset: 0;
  z-index: 58;
  display: none;
  place-items: center;
  padding: 52px 18px 22px;
  background: rgba(8, 8, 8, 0.86);
}

.page-lightbox.is-open {
  display: grid;
}

.page-frame {
  width: min(96vw, 1180px);
  height: min(88vh, 860px);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  overflow: hidden;
  background: var(--white);
  border: 2px solid var(--white);
  border-radius: 12px;
}

.page-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 14px;
  color: var(--black);
  background: #fff6f0;
  border-bottom: 2px solid var(--black);
}

.page-bar strong {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.page-bar div {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.page-fallback,
.page-close {
  padding: 8px 12px;
  border: 2px solid var(--black);
  border-radius: 999px;
  color: var(--black);
  background: var(--white);
  font-weight: 900;
  text-decoration: none;
}

.page-frame iframe {
  width: 100%;
  height: 100%;
  border: 0;
  background: var(--white);
}

.page-frame p {
  margin: 0;
  padding: 8px 14px;
  color: var(--mutedInk);
  font-size: 0.82rem;
  background: #fff6f0;
}

.event-collage {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: rgba(255, 255, 255, 0.28);
}

.event-collage img {
  aspect-ratio: 1.25 / 1;
}

.contact-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(24px, 4vw, 42px);
  align-items: center;
}

.contact-layout img {
  width: 100%;
  max-height: 470px;
  object-fit: cover;
  border: 2px solid var(--black);
  border-radius: 12px;
}

.contact-card h3 {
  margin: 0 0 42px;
  font-family: var(--display);
  font-size: clamp(2rem, 3.8vw, 4rem);
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

dl,
dd {
  margin: 0;
}

.contact-card dl {
  display: none;
}

.contact-links {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 26px;
}

.contact-link {
  display: grid;
  position: relative;
  z-index: 2;
  grid-template-columns: 1fr;
  gap: 10px;
  align-items: start;
  padding: 0;
  color: var(--black);
  background: transparent;
  border: 0;
  border-radius: 0;
  text-decoration: none;
  transition: transform 180ms ease;
  cursor: pointer;
}

.contact-link:hover,
.contact-link:focus {
  transform: translateY(-2px);
}

.contact-label {
  color: var(--hot);
  font-size: clamp(1.05rem, 1.6vw, 1.45rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.contact-value {
  width: fit-content;
  font-size: clamp(1.25rem, 2.2vw, 2rem);
  font-weight: 900;
  line-height: 1.1;
  border-bottom: 3px solid var(--hot);
}

.contact-card a {
  overflow-wrap: anywhere;
}

.footer {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  max-width: 1440px;
  margin: 0 auto;
  padding: 22px var(--gutter);
  color: var(--black);
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.footer a {
  font-weight: 900;
  text-decoration: underline;
  text-underline-offset: 4px;
}

<script>
(function () {
  const data = window.portfolioData;
  const root = document.documentElement;

  Object.entries(data.settings.colors).forEach(([name, value]) => {
    root.style.setProperty(`--${name}`, value);
  });

  document.title = data.settings.siteTitle;

  const nav = document.getElementById("site-nav");
  nav.innerHTML = data.settings.nav
    .map((label) => {
      const section = data.sections.find((item) => item.label === label);
      if (!section) return "";
      if (section.type === "contentHub") {
        const sublinks = section.blocks
          .map((block) => `<a href="#${block.id}">${block.title}</a>`)
          .join("");
        return `
          <div class="nav-group">
            <a href="#${section.id}">${label}</a>
            <div class="nav-submenu">
              ${sublinks}
              <a href="#social-media">Social Media</a>
            </div>
          </div>
        `;
      }
      return `<a href="#${section.id}">${label}</a>`;
    })
    .join("");

  const menuToggle = document.querySelector(".menu-toggle");
  menuToggle.addEventListener("click", () => {
    const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
    menuToggle.setAttribute("aria-expanded", String(!isOpen));
    document.body.classList.toggle("nav-open", !isOpen);
  });

  nav.addEventListener("click", () => {
    menuToggle.setAttribute("aria-expanded", "false");
    document.body.classList.remove("nav-open");
  });

  document.querySelector(".hero").innerHTML = `
    <div class="hero-copy">
      <p class="section-label">${data.hero.subtitle}</p>
      <h1>${lineBreakTitle(data.hero.title)}</h1>
      ${data.hero.tagline ? `<p class="hero-tagline">${data.hero.tagline}</p>` : ""}
    </div>
    <figure class="hero-media">
      <img src="${data.hero.image}" alt="${data.hero.imageAlt}">
    </figure>
  `;

  const sectionRoot = document.getElementById("sections");
  const galleryItems = [];
  const orderedSections = data.settings.nav
    .map((label) => data.sections.find((section) => section.label === label))
    .filter(Boolean);
  sectionRoot.innerHTML = orderedSections.map(renderSection).join("");

  function renderSection(section) {
    const header = `
      <div class="section-heading">
        <p class="section-label">${section.label}</p>
        ${section.intro ? `<p class="intro">${section.intro}</p>` : ""}
      </div>
    `;

    const body = {
      skills: renderSkills,
      logos: renderLogos,
      cards: renderCards,
      brandBlocks: renderBrandBlocks,
      feature: renderFeature,
      gallery: renderGallery,
      showcase: renderShowcase,
      integrated: renderIntegrated,
      contentHub: renderContentHub,
      events: renderEvents,
      contact: renderContact
    }[section.type](section);

    return `<section id="${section.id}" class="section-page section-${section.type}">${header}${body}</section>`;
  }

  function renderSkills(section) {
    return `
      <div class="skills-layout">
        <div class="skill-list">
          ${section.skills
            .map(
              (skill) => `
                <article class="skill-row">
                  <h3>${skill.title}</h3>
                  <div class="skill-tags">
                    ${skill.items.map((item) => `<span>${item}</span>`).join("")}
                  </div>
                </article>
              `
            )
            .join("")}
        </div>
      </div>
    `;
  }

  function renderLogos(section) {
    return `
      <div class="project-logo-grid" aria-label="Selected project logos">
        ${section.logos
          .map(
            (logo) => {
              const title = logo.title || logo.alt;
              return logo.videoEmbed
                ? `
              <div class="link-card">
              <button class="project-logo video-trigger" type="button" data-video="${attr(logo.videoEmbed)}" data-link="${attr(logo.link)}" data-title="${attr(title)}" aria-label="Watch ${attr(title)}">
                <img src="${logo.image}" alt="${logo.alt}" loading="lazy">
              </button>
              ${printLink(logo.link, title)}
              </div>
            `
                : `
              <div class="link-card">
              <button class="project-logo page-trigger" type="button" data-url="${attr(logo.link)}" data-embed-url="${attr(logo.openAsPage ? logo.link : logo.embedUrl || logo.link)}" data-title="${attr(title)}" aria-label="Open ${attr(title)}">
                <img src="${logo.image}" alt="${logo.alt}" loading="lazy">
              </button>
              ${printLink(logo.link, title)}
              </div>
            `;
            }
          )
          .join("")}
      </div>
    `;
  }

  function renderCards(section) {
    return `
      <div class="article-grid">
        ${section.items
          .map(
            (item) => `
              <div class="link-card">
              <button class="article-card ${item.external ? "external-trigger" : "page-trigger"}" type="button" data-url="${attr(item.link)}" data-embed-url="${attr(item.embedUrl || item.link)}" data-title="${attr(item.title)}" aria-label="Open ${attr(item.title)}">
                <img src="${item.image}" alt="${item.brand}" loading="lazy">
                <h3 ${item.title.match(/[\u0590-\u05ff]/) ? 'dir="rtl"' : ""}>${textWithBreaks(item.title)}</h3>
              </button>
              ${printLink(item.link, item.title)}
              </div>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderBrandBlocks(section) {
    return `
      <div class="brand-blocks">
        ${section.items
          .map(
            (item, index) => `
              <div class="link-card">
              <button class="brand-block block-${index + 1} ${item.external ? "external-trigger" : "page-trigger"}" type="button" data-url="${attr(item.link)}" data-embed-url="${attr(item.embedUrl || item.link)}" data-title="${attr(item.title)}" aria-label="Open ${attr(item.title)}">
                <img src="${item.image}" alt="${item.title}" loading="lazy">
              </button>
              ${printLink(item.link, item.title)}
              </div>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderFeature(section) {
    const media = `
      <img src="${section.image}" alt="${section.imageAlt}" loading="lazy">
      <span class="play-button" aria-hidden="true"></span>
    `;

    if (section.videoEmbed) {
      return `
        <div class="feature-layout">
          <button class="feature-media video-trigger" type="button" data-video="${attr(section.videoEmbed)}" data-link="${attr(section.link)}" data-title="${attr(section.cta)}" aria-label="${attr(section.cta)}">
            ${media}
          </button>
          ${printLink(section.link, section.cta)}
        </div>
      `;
    }

    return `
      <div class="feature-layout">
        <button class="feature-media page-trigger" type="button" data-url="${attr(section.link)}" data-embed-url="${attr(section.embedUrl || section.link)}" data-title="${attr(section.cta)}" aria-label="${attr(section.cta)}">
          ${media}
        </button>
        ${printLink(section.link, section.cta)}
      </div>
    `;
  }

  function renderGallery(section) {
    return `
      <div class="gallery-grid">
        ${section.items
          .map(
            (item) => `
              <article class="gallery-item">
                <div class="item-title">
                  ${item.number ? `<span>${item.number}</span>` : ""}
                  <h3>${textWithBreaks(item.title)}</h3>
                </div>
                <img src="${item.image}" alt="${item.title}" loading="lazy">
              </article>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderShowcase(section) {
    return `
      <div class="showcase-grid">
        ${section.items
          .map(
            (item, index) => `
              <article class="showcase-item showcase-${index + 1}">
                <div class="item-title">
                  ${item.number ? `<span>${item.number}</span>` : ""}
                  <h3>${textWithBreaks(item.title)}</h3>
                </div>
                ${item.link ? linkedSample(item) : focusableImage(item, section.label)}
              </article>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderContentHub(section) {
    return `
      <div class="content-hub">
        ${section.blocks.map((block) => renderContentBlock(block)).join("")}
      </div>
    `;
  }

  function renderContentBlock(block) {
    return `
      <article id="${block.id}" class="content-block content-block-${block.type}">
        <div class="content-block-heading">
          <h2>${block.title}</h2>
          ${block.intro ? `<p class="intro">${block.intro}</p>` : ""}
        </div>
        ${
          {
            cards: renderCards,
            showcase: renderShowcase,
            integrated: renderIntegrated,
            feature: renderFeature
          }[block.type](block)
        }
      </article>
    `;
  }

  function renderIntegrated(section) {
    return `
      <div class="integrated-stack copywriting-stack">
        ${section.groups
          .map(
            (group) => `
              <article ${group.id ? `id="${group.id}"` : ""} class="integrated-group copy-section" aria-label="${group.title}">
                <div class="copy-title">
                  ${group.title ? `<h3>${group.title}</h3>` : ""}
                </div>
                <div class="gallery-grid compact-gallery copy-grid three">
                  ${group.items
                    .map(
                      (item) => `
                        ${item.storyTitle ? `<div class="item-title story-break"><h4>${textWithBreaks(item.storyTitle)}</h4></div>` : ""}
                        <article class="gallery-item">
                          ${item.title ? `<div class="item-title">${item.number ? `<span>${item.number}</span>` : ""}<h4>${textWithBreaks(item.title)}</h4></div>` : ""}
                          ${item.link ? linkedSample(item) : focusableImage(item, group.category || group.title || section.label)}
                          ${item.link ? printLink(item.link, item.title || "Open link") : ""}
                        </article>
                      `
                    )
                    .join("")}
                </div>
              </article>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderEvents(section) {
    return `
      <div class="event-grid">
        ${section.items
          .map(
            (item) => renderEventItem(item)
          )
          .join("")}
      </div>
    `;
  }

  function renderEventItem(item) {
    const content = `
      ${renderEventImages(item)}
      <h3>${textWithBreaks(item.title)}</h3>
    `;

    if (item.videoEmbed) {
      return `
        <div class="link-card">
        <button class="event-item video-trigger" type="button" data-video="${attr(item.videoEmbed)}" data-link="${attr(item.link)}" data-title="${attr(item.title)}" aria-label="Watch ${attr(item.title)}">
          ${content}
        </button>
        ${printLink(item.link, item.title)}
        </div>
      `;
    }

    return `
      <div class="link-card">
      <button class="event-item ${item.external ? "external-trigger" : "page-trigger"}" type="button" data-url="${attr(item.link || "#events")}" data-embed-url="${attr(item.embedUrl || item.link || "#events")}" data-title="${attr(item.title)}" aria-label="Open ${attr(item.title)}">
        ${content}
      </button>
      ${item.link ? printLink(item.link, item.title) : ""}
      </div>
    `;
  }

  function renderEventImages(item) {
    if (item.images) {
      return `
        <div class="event-collage">
          ${item.images.map((image) => `<img src="${image}" alt="${item.title}" loading="lazy">`).join("")}
        </div>
      `;
    }
    return `<img src="${item.image}" alt="${item.title}" loading="lazy">`;
  }

  function clickableImage(item) {
    const image = `<img src="${item.image}" alt="${item.title}" loading="lazy">`;
    return item.link ? `<a href="${item.link}" target="_blank" rel="noopener">${image}</a>` : image;
  }

  function focusableImage(item) {
    const index = galleryItems.length;
    galleryItems.push({
      image: item.image,
      title: item.title || "Portfolio sample",
      category: arguments[1] || "Portfolio sample",
      size: item.size || ""
    });
    const classes = ["focus-image"];
    if (item.fit === "coverTop") classes.push("fit-cover-top");
    if (item.fit === "contain") classes.push("fit-contain");
    if (item.fit === "natural") classes.push("fit-natural");
    if (item.fit === "fill") classes.push("fit-fill");
    if (item.fit === "backdrop") classes.push("fit-backdrop");
    if (item.fit === "pdfBackdrop") classes.push("fit-pdf-backdrop");
    if (item.fit === "siteBackdropContain") classes.push("fit-site-backdrop-contain");
    if (item.fit === "maternityCover") classes.push("fit-maternity-cover");
    if (item.size === "large") classes.push("needs-large-view");

    return `
      <button class="${classes.join(" ")}" type="button" data-index="${index}" data-full="${attr(item.image)}" data-title="${attr(item.title || "Portfolio sample")}" aria-label="Enlarge ${attr(item.title || "portfolio sample")}">
        <span class="sample-backdrop" style="background-image: url('${attr(item.image)}');" aria-hidden="true"></span>
        <img src="${item.image}" alt="${attr(item.title || "Portfolio sample")}" loading="lazy">
      </button>
    `;
  }

  function linkedSample(item) {
    const classes = ["linked-sample", "page-trigger"];
    if (item.fit === "coverTop") classes.push("fit-cover-top");
    if (item.fit === "coverCenter") classes.push("fit-cover-center");
    if (item.fit === "socialLinkCover") classes.push("fit-social-link-cover");
    return `
      <button class="${classes.join(" ")}" type="button" data-url="${attr(item.link)}" data-embed-url="${attr(item.embedUrl || item.link)}" data-title="${attr(item.title)}" aria-label="Open ${attr(item.title)}">
        <img src="${item.image}" alt="${attr(item.title || "Portfolio sample")}" loading="lazy">
      </button>
    `;
  }

  function renderContact(section) {
    const emailHref = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(section.email)}`;
    const phoneHref = `tel:${section.phone.replace(/[^\d+]/g, "")}`;
    return `
      <div class="contact-layout">
        <div class="contact-card">
          <div class="contact-links">
            <a class="contact-link contact-email" href="${emailHref}" aria-label="Email Lilach at ${section.email}">
              <span class="contact-label">E-mail</span>
              <span class="contact-value">${section.email}</span>
            </a>
            <a class="contact-link contact-phone" href="${phoneHref}" aria-label="Call Lilach at ${section.phone}">
              <span class="contact-label">Phone</span>
              <span class="contact-value">${section.phone}</span>
            </a>
          </div>
        </div>
        <img src="${section.image}" alt="${section.imageAlt}" loading="lazy">
      </div>
    `;
  }

  function lineBreakTitle(title) {
    return title
      .split(" ")
      .map((word) => `<span>${word}</span>`)
      .join("");
  }

  function attr(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll('"', "&quot;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function textWithBreaks(value) {
    return attr(value).replaceAll("\n", "<br>");
  }

  function printLink(url, label = "Open link") {
    if (!url) return "";
    return `<a class="print-link" href="${attr(url)}" aria-label="${attr(label)}"></a>`;
  }

  const lightbox = document.createElement("div");
  lightbox.className = "lightbox";
  lightbox.innerHTML = `
    <button class="lightbox-close" type="button" aria-label="Close enlarged image">Close</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="Previous image"></button>
    <figure>
      <aside class="lightbox-meta">
        <p class="lightbox-category"></p>
        <figcaption></figcaption>
      </aside>
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
    </figure>
    <button class="lightbox-nav lightbox-next" type="button" aria-label="Next image"></button>
  `;
  document.body.appendChild(lightbox);
  let activeGalleryIndex = 0;
  let mobileOverlayStateActive = false;
  let closingOverlayFromUi = false;

  document.addEventListener("click", (event) => {
    const contactTrigger = event.target.closest(".contact-link");
    if (contactTrigger) {
      event.preventDefault();
      event.stopImmediatePropagation();
      openInNewTab(contactTrigger.href);
      return;
    }

    const trigger = event.target.closest(".focus-image");
    if (!trigger) return;
    activeGalleryIndex = Number(trigger.dataset.index || 0);
    updateLightbox();
    lightbox.classList.add("is-open");
    document.body.classList.add("lightbox-open");
    pushMobileOverlayState();
  });

  lightbox.addEventListener("click", (event) => {
    if (event.target === lightbox || event.target.closest(".lightbox-close")) {
      closeOverlayFromUi(closeImageLightbox);
      return;
    }

    if (event.target.closest(".lightbox-prev")) {
      moveGallery(-1);
    }

    if (event.target.closest(".lightbox-next")) {
      moveGallery(1);
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeOverlayFromUi(closeAnyOverlay);
    }

    if (!lightbox.classList.contains("is-open")) return;
    if (event.key === "ArrowLeft") moveGallery(-1);
    if (event.key === "ArrowRight") moveGallery(1);
  });

  function moveGallery(direction) {
    activeGalleryIndex = (activeGalleryIndex + direction + galleryItems.length) % galleryItems.length;
    updateLightbox();
  }

  function updateLightbox() {
    const item = galleryItems[activeGalleryIndex];
    if (!item) return;
    const image = lightbox.querySelector("img");
    const caption = lightbox.querySelector("figcaption");
    const category = lightbox.querySelector(".lightbox-category");
    image.src = item.image;
    image.alt = item.title;
    image.classList.toggle("is-large-sample", item.size === "large");
    category.textContent = item.category;
    caption.textContent = "";
  }

  function closeImageLightbox() {
    lightbox.classList.remove("is-open");
    document.body.classList.remove("lightbox-open");
  }

  const videoLightbox = document.createElement("div");
  videoLightbox.className = "video-lightbox";
  videoLightbox.innerHTML = `
    <div class="video-frame" role="dialog" aria-modal="true" aria-label="Portfolio video">
      <button class="video-close" type="button" aria-label="Close video">Close</button>
      <iframe title="Portfolio video" src="" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <a class="video-fallback" href="#" target="_blank" rel="noopener">Open on YouTube</a>
    </div>
  `;
  document.body.appendChild(videoLightbox);

  document.addEventListener("click", (event) => {
    const trigger = event.target.closest(".video-trigger");
    if (!trigger) return;
    const iframe = videoLightbox.querySelector("iframe");
    const fallback = videoLightbox.querySelector(".video-fallback");
    const source = trigger.dataset.video;
    const separator = source.includes("?") ? "&" : "?";
    iframe.src = `${source}${separator}autoplay=1&rel=0`;
    iframe.title = trigger.dataset.title || "Portfolio video";
    fallback.href = trigger.dataset.link || source;
    videoLightbox.classList.add("is-open");
    document.body.classList.add("lightbox-open");
    pushMobileOverlayState();
  });

  videoLightbox.addEventListener("click", (event) => {
    if (event.target === videoLightbox || event.target.closest(".video-close")) {
      closeOverlayFromUi(closeVideo);
    }
  });

  function closeVideo() {
    if (!videoLightbox) return;
    videoLightbox.classList.remove("is-open");
    document.body.classList.remove("lightbox-open");
    const iframe = videoLightbox.querySelector("iframe");
    if (iframe) iframe.src = "";
  }

  const pageLightbox = document.createElement("div");
  pageLightbox.className = "page-lightbox";
  pageLightbox.innerHTML = `
    <div class="page-frame" role="dialog" aria-modal="true" aria-label="Portfolio link preview">
      <div class="page-bar">
        <strong></strong>
        <div>
          <a class="page-fallback" href="#" target="_blank" rel="noopener">Open in new tab</a>
          <button class="page-close" type="button" aria-label="Close preview">Close</button>
        </div>
      </div>
      <iframe title="Portfolio link preview" src="" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
  `;
  document.body.appendChild(pageLightbox);

  document.addEventListener("click", (event) => {
    const externalTrigger = event.target.closest(".external-trigger");
    if (externalTrigger) {
      openInNewTab(externalTrigger.dataset.url);
      return;
    }

    const trigger = event.target.closest(".page-trigger");
    if (!trigger) return;
    const url = trigger.dataset.url;
    const embedUrl = trigger.dataset.embedUrl || url;
    if (!url || url.startsWith("#")) return;
    const iframe = pageLightbox.querySelector("iframe");
    const title = pageLightbox.querySelector("strong");
    const fallback = pageLightbox.querySelector(".page-fallback");
    iframe.onerror = () => fallbackToExternal(closePagePreview, url);
    title.textContent = trigger.dataset.title || "Portfolio link";
    iframe.src = embedUrl;
    fallback.href = url;
    pageLightbox.classList.add("is-open");
    document.body.classList.add("lightbox-open");
    pushMobileOverlayState();
    window.setTimeout(() => {
      if (!pageLightbox.classList.contains("is-open")) return;
      if (!shouldExternalFallbackAfterAttempt(url)) return;
      fallbackToExternal(closePagePreview, url);
    }, 900);
  });

  pageLightbox.addEventListener("click", (event) => {
    if (event.target === pageLightbox || event.target.closest(".page-close")) {
      closeOverlayFromUi(closePagePreview);
    }
  });

  function closePagePreview() {
    if (!pageLightbox) return;
    pageLightbox.classList.remove("is-open");
    document.body.classList.remove("lightbox-open");
    const iframe = pageLightbox.querySelector("iframe");
    if (iframe) iframe.src = "";
  }

  function openInNewTab(url) {
    if (!url) return;
    window.open(url, "_blank", "noopener");
  }

  function fallbackToExternal(closeFn, url) {
    if (!url) return;
    if (isMobileViewport() && mobileOverlayStateActive) {
      closingOverlayFromUi = true;
      closeFn();
      mobileOverlayStateActive = false;
      history.back();
      window.setTimeout(() => openInNewTab(url), 80);
      return;
    }
    closeFn();
    openInNewTab(url);
  }

  function shouldExternalFallbackAfterAttempt(url) {
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace(/^www\./, "");
      return (
        host === "provacan.co.uk" && parsed.pathname.includes("/blogs/cbd-academy/cbd-for-sleep")
      ) || (
        host === "ynet.co.il" && parsed.pathname.includes("/articles/")
      ) || (
        host === "magazine.shufersal.co.il"
      );
    } catch {
      return false;
    }
  }

  function isMobileViewport() {
    return window.matchMedia("(max-width: 900px)").matches;
  }

  function isAnyOverlayOpen() {
    return (
      lightbox.classList.contains("is-open") ||
      videoLightbox.classList.contains("is-open") ||
      pageLightbox.classList.contains("is-open")
    );
  }

  function pushMobileOverlayState() {
    if (!isMobileViewport() || mobileOverlayStateActive) return;
    const cleanUrl = `${window.location.pathname}${window.location.search}`;
    history.pushState({ portfolioOverlay: true }, "", `${cleanUrl}#portfolio-overlay`);
    mobileOverlayStateActive = true;
  }

  function closeOverlayFromUi(closeFn) {
    if (isMobileViewport() && mobileOverlayStateActive) {
      closingOverlayFromUi = true;
      closeFn();
      mobileOverlayStateActive = false;
      history.back();
      return;
    }
    closeFn();
  }

  function closeAnyOverlay() {
    closeImageLightbox();
    closeVideo();
    closePagePreview();
  }

  window.addEventListener("popstate", () => {
    if (closingOverlayFromUi) {
      closingOverlayFromUi = false;
      return;
    }
    if (!isMobileViewport()) return;
    if (mobileOverlayStateActive || isAnyOverlayOpen()) {
      closeAnyOverlay();
      mobileOverlayStateActive = false;
      if (window.location.hash === "#portfolio-overlay") {
        history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
      }
    }
  });

})();

</script>
  </body>
</html>
